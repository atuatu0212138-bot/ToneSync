<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ToneSync · 批量色调统一</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236B5CE7'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="home" title="返回上传界面">
      <div class="logo"></div>
      <div class="brand">ToneSync</div>
    </div>
    <div class="brand-sub">批量色调统一 · M1 demo</div>
    <div class="spacer"></div>
    <div class="local-badge"><span class="dot"></span>全程本地处理，图片不上传</div>
  </header>

  <div id="main">
    <div id="center">
      <!-- 空状态 -->
      <div id="empty">
        <div class="empty-logo"></div>
        <div class="empty-title">批量色调，一秒统一</div>
        <div class="empty-sub">拖入一批素材图与一张参考图<br>几百张图片实时统一成同一个色调</div>
        <div class="empty-actions">
          <div class="empty-btn-row">
            <button id="btn-upload" class="pill">＋ 批量上传素材</button>
            <button id="btn-upload-ref" class="pill">上传参考图</button>
          </div>
          <button id="btn-demo" class="link-btn">或使用示例图体验 →</button>
          <button id="btn-back" class="link-btn" hidden>返回工作区 →</button>
          <button id="btn-clear" class="link-btn" hidden>清空工作区（含已保存的会话）</button>
        </div>
      </div>

      <!-- 画布区：单一 WebGL canvas 承载单图 / 网格墙 / 胶片条 -->
      <div id="stage" hidden>
        <canvas id="glcanvas"></canvas>
        <!-- 画布区右上角：视图切换（PRD §5.2） -->
        <button id="view-toggle" title="单图 / 网格墙 切换">
          <svg id="ico-wall" width="17" height="17" viewBox="0 0 20 20"><g fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="2.5" width="6" height="6" rx="1.5"/><rect x="11.5" y="2.5" width="6" height="6" rx="1.5"/><rect x="2.5" y="11.5" width="6" height="6" rx="1.5"/><rect x="11.5" y="11.5" width="6" height="6" rx="1.5"/></g></svg>
          <svg id="ico-single" width="17" height="17" viewBox="0 0 20 20" hidden><rect x="3" y="4" width="14" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <!-- 单图模式左右边界线标（PRD §5.2 边缘导航） -->
        <div id="nav-prev" class="edge-nav"><div class="edge-line"></div><div class="edge-chev">‹</div></div>
        <div id="nav-next" class="edge-nav"><div class="edge-line"></div><div class="edge-chev">›</div></div>
        <div id="img-name"></div>
        <div id="counter"></div>
        <!-- 分屏对比覆盖层（位置由 JS 跟随图片矩形） -->
        <div id="split-bar" hidden><div class="split-handle">◂▸</div></div>
        <button id="thumb-del" hidden title="删除该素材">✕</button>
        <div id="cmp-l" class="cmp-label" hidden>原图</div>
        <div id="cmp-r" class="cmp-label" hidden></div>
      </div>
    </div>

    <!-- 右侧调色面板 -->
    <aside id="panel" hidden>
      <div id="panel-resize" title="拖动调整面板宽度"></div>
      <div class="panel-head">
        <div class="panel-title">调色</div>
        <div class="spacer"></div>
        <button id="btn-fav" class="ghost-btn" title="收藏当前色调为模版">
          <svg width="15" height="15" viewBox="0 0 20 20"><path d="M10 2.6l2.1 4.6 5 .5-3.75 3.4 1.1 4.9L10 13.9 5.55 16.5l1.1-4.9L2.9 7.7l5-.5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-reset" class="ghost-btn" title="重置">
          <svg width="14" height="14" viewBox="0 0 20 20"><path d="M16.5 10a6.5 6.5 0 1 1-1.9-4.6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M17 2.6v3.6h-3.6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-manual" class="ghost-btn" title="手动调色（即将上线）">
          <svg width="15" height="15" viewBox="0 0 20 20"><g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 6h9M16 6h0.5M4 14h5M12 14h4.5"/><circle cx="14.5" cy="6" r="2"/><circle cx="10.5" cy="14" r="2"/></g></svg>
        </button>
      </div>
      <div class="panel-body">
        <!-- 参考图 / 导入 .cube 合并单模块（v0.11：一个入口位，定高不随内容变化，严格参照原型） -->
        <section id="ref-sec">
          <div class="sec-label">参考图 / 导入 .cube <span id="ref-count"></span></div>
          <div id="tone-box">
            <div id="ref-add">
              <svg width="18" height="18" viewBox="0 0 20 20"><rect x="2.5" y="3.5" width="15" height="13" rx="2.5" fill="none" stroke="#6C6C76" stroke-width="1.4"/><circle cx="7" cy="8" r="1.5" fill="#6C6C76"/><path d="M4 14l4-4 3 3 2.5-2.5L17 14" fill="none" stroke="#6C6C76" stroke-width="1.4" stroke-linejoin="round"/></svg>
              <div class="ref-hint">＋ 参考图 / 导入 .cube</div>
              <div class="ref-sub">图片作为参考图（可多选，最多 20 张，合成一个色调）<br>.cube 作为 LUT（只保留一个，再导入即替换）</div>
            </div>
            <div id="ref-view" hidden>
              <div id="ref-main" title="点击应用参考图色调">
                <img id="ref-big" alt="参考图">
                <button id="ref-prev" class="ref-nav">‹</button>
                <button id="ref-next" class="ref-nav">›</button>
                <button id="ref-append" title="追加参考图 / 导入 .cube">＋</button>
                <button id="ref-del" title="移除这张参考图">✕</button>
              </div>
              <div id="ref-palette"></div>
            </div>
            <div id="cube-chip" class="cube-item" hidden>
              <div class="chip"></div>
              <div class="name"></div>
              <button class="del" title="删除导入的 .cube">✕</button>
            </div>
          </div>
        </section>

        <!-- 分类页签 + 垫图卡片（v0.9） -->
        <section>
          <div id="cube-tabs">
            <button data-tab="common" class="on">常用</button>
            <button data-tab="builtin">内置</button>
            <button data-tab="fav">收藏</button>
            <button data-tab="recent">最近</button>
          </div>
          <div id="tab-common"><div id="presets" class="card-grid"></div></div>
          <div id="tab-builtin" hidden>
            <div id="builtins" class="card-grid"></div>
            <div id="builtin-loading" class="tab-empty">内置 LUT 加载中…</div>
          </div>
          <div id="tab-fav" hidden>
            <div id="favs" class="card-grid"></div>
            <div id="fav-empty" class="tab-empty">还没有收藏<br>点面板右上角 ★ 把当前色调收藏为模版</div>
          </div>
          <div id="tab-recent" hidden>
            <div id="hist-list"></div>
            <div id="recent-empty" class="tab-empty">还没有使用记录<br>导出 .cube 或下载图片时，当前色调自动存入</div>
          </div>
        </section>

        <section id="strength-sec">
          <div class="row">
            <div class="sec-label">强度</div>
            <div class="spacer"></div>
            <div id="strength-val">70%</div>
          </div>
          <input id="strength" type="range" min="0" max="100" step="1" value="70">
          <div class="range-ends"><span>原图</span><span>完全匹配</span></div>
        </section>

        <section id="cmp-sec">
          <div class="row" style="align-items:center">
            <div class="sec-label" style="color:#9A9AA4;font-size:12px;letter-spacing:0">分屏对比</div>
            <div class="spacer"></div>
            <div id="cmp-toggle" class="switch"><div class="knob"></div></div>
          </div>
        </section>

        <div class="divider"></div>

        <!-- 导出区（v0.11：只留两个按钮，默认烘焙当前强度） -->
        <section id="export-sec">
          <div class="sec-label">导出</div>
          <button id="btn-export-cube" class="primary-btn">导出成 .cube</button>
          <button id="btn-export-imgs" class="outline-btn">下载图片</button>
        </section>
      </div>
    </aside>

    <!-- 最右图标窄栏 -->
    <nav id="rail" hidden>
      <button id="rail-panel" title="展开 / 收起调色面板">
        <svg width="17" height="17" viewBox="0 0 20 20"><rect x="2.5" y="3.5" width="15" height="13" rx="3" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="12.5" y1="3.5" x2="12.5" y2="16.5" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
      <div class="rail-div"></div>
      <button id="rail-tone" title="调色（参考图 / .cube / 模版）">
        <svg width="17" height="17" viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0 0 18c.9 0 1.6-.7 1.6-1.6 0-.4-.16-.78-.42-1.06a1.6 1.6 0 0 1-.42-1.08c0-.9.72-1.6 1.6-1.6H16.2A4.8 4.8 0 0 0 21 10.9C21 6.5 16.97 3 12 3z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="7" cy="11.5" r="1.25" fill="currentColor"/><circle cx="9.6" cy="7.4" r="1.25" fill="currentColor"/><circle cx="14.4" cy="7.4" r="1.25" fill="currentColor"/></svg>
      </button>
      <div class="rail-div"></div>
      <button id="rail-add" title="批量上传素材">
        <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 2.5v11M2.5 8h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </nav>
  </div>

  <div id="dropzone" hidden>松开以导入素材</div>
  <div id="toast" hidden></div>
  <input id="file-input" type="file" accept="image/*" multiple hidden>
  <input id="ref-input" type="file" accept="image/*" multiple hidden>
  <input id="tone-input" type="file" accept="image/*,.cube" multiple hidden>
</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
